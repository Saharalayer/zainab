<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحة الطلبات - House of Zainab</title>
  <link rel="stylesheet" href="orders.css">
  <!-- أيقونات Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- رأس الصفحة -->
  <header>
    <h1>صفحة الطلبات</h1>
    <p>اختاري منتجاتك وأكملي بياناتك لإتمام الطلب</p>
  </header>

  <!-- نموذج الطلب -->
  <section id="order-form">
    <form>
      <!-- اختيار المنتج -->
      <label for="product">اختر المنتج:</label>
      <select id="product" name="product" required>
        <option value="">-- اختاري --</option>
        <option value="melhaf">ملاحف</option>
        <option value="siikan">صيكان</option>
        <option value="accessories">إكسسوارات</option>
      </select>

      <!-- الكمية -->
      <label for="quantity">الكمية:</label>
      <input type="number" id="quantity" name="quantity" min="1" value="1" required>

      <!-- بيانات العميل -->
      <label for="name">الاسم الكامل:</label>
      <input type="text" id="name" name="name" required>

      <label for="phone">رقم الهاتف:</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="address">العنوان:</label>
      <textarea id="address" name="address" rows="3" required></textarea>

      <!-- خيارات التوصيل -->
      <label for="delivery">طريقة التوصيل:</label>
      <select id="delivery" name="delivery" required>
        <option value="">-- اختاري --</option>
        <option value="home">توصيل إلى المنزل داخل المدينة</option>
        <option value="fast">توصيل سريع في نفس اليوم</option>
        <option value="pickup">الاستلام من المتجر مباشرة</option>
      </select>

      <!-- زر الإرسال -->
      <button type="submit">إرسال الطلب</button>
    </form>

    <!-- قسم التواصل الاجتماعي -->
    <div class="follow-us">
      <p>تابعي جديد المتجر وكوني أول من يعلم</p>
      <div class="social-links">
        <a href="https://www.tiktok.com/@housezainab" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.instagram.com/house_zainab/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.snapchat.com/@housezainab" target="_blank"><i class="fab fa-snapchat"></i></a>
        <a href="https://www.pinterest.com/housezainab" target="_blank"><i class="fab fa-pinterest"></i></a>
      </div>
    </div>
  </section>

  <!-- تذييل -->
  <footer>
    <p>© 2026 House of Zainab - جميع الحقوق محفوظة</p>
  </footer>

</body>
</html>
